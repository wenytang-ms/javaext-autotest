# 示例 Test Plan: 通过 CI/CD 注册 API
#
# 用法: autotest run test-plans/register-api-cicd.yaml

name: "通过 CI/CD 注册 API"
description: "测试通过 Command Palette 执行 Register API 并选择 GitHub 作为 CI/CD provider"

setup:
  extension: "azure-api-center"
  extensionPath: "../../vscode-azureapicenter"
  vscodeVersion: "insiders"
  workspace: "./test-workspace"
  timeout: 15

steps:
  - id: "open-command-palette"
    action: "执行命令 Azure API Center: Register API"
    verify: "弹出选项列表"

  - id: "select-cicd"
    action: "选择 CI/CD 选项"
    verify: "显示 CI/CD provider 选项"

  - id: "select-github"
    action: "选择 GitHub 选项"
    verify: "开始生成配置文件"

  - id: "verify-file-created"
    action: "等待 5 秒"
    verifyFile:
      path: ".github/workflows/register-api.yml"
      contains: "azure/api-center"
